<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mise à jour du site</title>
  <style>
    body{font-family:system-ui,sans-serif;max-width:720px;margin:10vh auto;padding:24px;line-height:1.6;color:#17324d;background:#fffdf7}
    .box{background:white;border:1px solid #d8dfe5;border-radius:18px;padding:24px;box-shadow:0 12px 30px rgba(23,50,77,.12)}
  </style>
</head>
<body>
  <div class="box">
    <h1>Mise à jour en cours…</h1>
    <p>Suppression de l’ancienne version enregistrée dans ce navigateur.</p>
    <p id="status" role="status" aria-live="polite">Patiente quelques secondes.</p>
  </div>
  <script>
    (async()=>{
      try{
        if('serviceWorker' in navigator){
          const regs=await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r=>r.unregister()));
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.map(k=>caches.delete(k)));
        }
        document.getElementById('status').textContent='Ancienne version supprimée. Ouverture de la nouvelle page…';
      }catch(e){
        document.getElementById('status').textContent='Ouverture de la nouvelle page…';
      }
      setTimeout(()=>location.replace('index.html?mise-a-jour=20260723c'),800);
    })();
  </script>
</body>
</html>
